seed: 42
deterministic: false
num_workers: 0

data:
  pde_family: reaction_diffusion
  n_train: 40000
  n_val: 5000
  n_test: 5000
  grid_size: 32
  m_min: 20
  m_max: 60
  noise_min: 0.001
  noise_max: 0.05
  noise_type: gaussian
  k_type: gp
  n_time_snapshots: 4
  matern_nu_choices: [0.5, 1.5, 2.5]
  n_total_generate: 50000

model:
  d_model: 128
  n_heads: 4
  n_layers: 3
  dropout: 0.1
  mc_samples: 50
  include_time: true

training:
  lr: 1e-4
  weight_decay: 1e-5
  batch_size: 48
  epochs: 120
  patience: 20
  lambda_reg: 0.01
  grad_clip: 1.0
  min_epochs_before_early_stop: 50
  sigma_floor: 0.1
  sigma_reg_weight: 0.1
  sanity_enabled: true
  sanity_samples: 8
  sanity_epochs: 120
  sanity_lr: 5e-4
  sanity_target_rmse: 0.2
  target_fields: [k_grid, r_grid]

evaluation:
  ece_bins: 15
  coverage_level: 0.90
  temperature_scaling:
    enabled: false
  pinn:
    max_instances: 60
    steps: 1200
    min_steps: 400
    convergence_tol: 1e-6
    convergence_patience: 150
    optimizers: [adam, lbfgs]
    lr_grid: [1e-2, 1e-3, 1e-4]
