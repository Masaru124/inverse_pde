seed: 42
deterministic: false
num_workers: 0

data:
  n_train: 64
  n_val: 16
  n_test: 16
  grid_size: 32
  m_min: 20
  m_max: 40
  noise_min: 0.001
  noise_max: 0.01
  matern_nu_choices: [0.5, 1.5, 2.5]
  n_total_generate: 96

model:
  d_model: 64
  n_heads: 4
  n_layers: 2
  dropout: 0.2
  mc_samples: 8

training:
  lr: 3e-5
  weight_decay: 1e-4
  batch_size: 8
  epochs: 50
  patience: 20
  lambda_reg: 0.01
  grad_clip: 1.0
  warmup_epochs: 0
  min_epochs_before_early_stop: 30
  sigma_floor: 0.1
  sigma_reg_weight: 0.1
  sanity_enabled: true
  sanity_samples: 10
  sanity_epochs: 200
  sanity_lr: 5e-4
  sanity_target_rmse: 0.1

evaluation:
  ece_bins: 15
  coverage_level: 0.90
