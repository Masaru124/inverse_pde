seed: 42
deterministic: false
num_workers: 0
pin_memory: true
persistent_workers: false
prefetch_factor: 2

data:
  pde_family: diffusion
  n_train: 40000
  n_val: 5000
  n_test: 5000
  grid_size: 32
  m_min: 20
  m_max: 100
  noise_min: 0.001
  noise_max: 0.05
  noise_type: gaussian
  k_type: gp
  n_time_snapshots: 3
  matern_nu_choices: [0.5, 1.5, 2.5]
  n_total_generate: 50000
  generation_shard_size: 5000
  generation_batch_size: 32
  generation_progress_interval: 200
  generation_forcing_mode: finite_diff

model:
  d_model: 96
  n_heads: 4
  n_layers: 3
  dropout: 0.2
  mc_samples: 50
  include_time: false

training:
  lr: 5e-5
  weight_decay: 1e-4
  batch_size: 64
  epochs: 100
  patience: 20
  lambda_reg: 0.01
  grad_clip: 1.0
  warmup_epochs: 5
  min_epochs_before_early_stop: 50
  sigma_floor: 0.1
  sigma_reg_weight: 0.1
  sanity_enabled: true
  sanity_samples: 10
  sanity_epochs: 200
  sanity_lr: 5e-4
  sanity_target_rmse: 0.13
  target_fields: [k_grid]
  amp_enabled: true
  wandb_enabled: false
  generator_validation_enabled: false

evaluation:
  ece_bins: 15
  coverage_level: 0.90
  temperature_scaling:
    enabled: false
    objective: ece
    t_min: 0.5
    t_max: 3.0
    n_steps: 51
    coverage_min: 0.85
    enforce_non_sharpening: true
  pinn:
    max_instances: 40
    steps: 400
    min_steps: 1
    convergence_tol: 1e-6
    convergence_patience: 200
    lr: 1e-3
  attention_visualization:
    enabled: false
  budget:
    mlp_epochs: 8
    gp_max_samples: 800
    runtime_instances: 32
    ood_samples: 24
    resolution_samples: 16
